name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read
  security-events: write

env:
  REGISTRY: localhost:5000
  API_IMAGE: api
  WORKER_IMAGE: worker
  FRONTEND_IMAGE: frontend

jobs:

# ---------------- LINT ----------------
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python linting tool (flake8)
        run: pip install flake8

      - name: Run Python lint checks
        run: flake8 api worker

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install frontend dependencies and eslint
        run: |
          cd frontend
          npm install
          npm install eslint

      - name: Run frontend lint checks
        run: |
          cd frontend
          npx eslint . || true

      - name: Run Dockerfile linting with Hadolint
        uses: hadolint/hadolint-action@v3.1.0


# ---------------- TEST ----------------
  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout source code for tests
        uses: actions/checkout@v4

      - name: Set up Python for tests
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API dependencies and test tools
        run: |
          cd api
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Execute API test suite
        run: |
          cd api
          PYTHONPATH=. pytest --cov=. --cov-report=xml

      - name: Upload test coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml


# ---------------- BUILD ----------------
  build:
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout source code for build
        uses: actions/checkout@v4

      - name: Set up Docker Buildx for caching
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image with cache
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.API_IMAGE }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.API_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker image with cache
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.WORKER_IMAGE }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.WORKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image with cache
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max


# ---------------- SECURITY ----------------
  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout source code for security scan
        uses: actions/checkout@v4

      - name: Build API image for vulnerability scanning
        run: docker build -t api:latest ./api

      - name: Run Trivy vulnerability scan on API image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "api:latest"
          format: "sarif"
          output: "trivy.sarif"
          severity: "CRITICAL"

      - name: Upload Trivy SARIF report
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif


# ---------------- INTEGRATION ----------------
  integration:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Checkout source code for integration tests
        uses: actions/checkout@v4

      - name: Start application services with Docker Compose
        run: docker compose up -d --build

      - name: Wait for API health endpoint to be ready
        run: |
          for i in {1..12}; do
            curl -f http://localhost:8000/health && break
            sleep 5
          done

      - name: Install jq for JSON parsing
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run end-to-end job processing test
        run: |
          JOB_ID=$(curl -s -X POST http://localhost:8000/jobs | jq -r .job_id)

          for i in {1..12}; do
            STATUS=$(curl -s http://localhost:8000/jobs/$JOB_ID | jq -r .status)
            if [ "$STATUS" = "completed" ]; then
              echo "Job completed"
              exit 0
            fi
            sleep 3
          done

          echo "Job failed"
          exit 1

      - name: Tear down Docker Compose services
        if: always()
        run: docker compose down


# ---------------- DEPLOY ----------------
  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout source code for deployment
        uses: actions/checkout@v4

      - name: Deploy application (rolling simulation)
        run: |
          docker compose up -d --build

          for i in {1..12}; do
            if curl -f http://localhost:8000/health; then
              echo "Healthy"
              exit 0
            fi
            sleep 5
          done

          echo "Deploy failed"
          exit 1