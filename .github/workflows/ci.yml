name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:

jobs:

# ---------------- LINT ----------------
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install flake8
      - run: flake8 api worker

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - run: |
          cd frontend
          npm install
          npm install eslint

      - run: |
          cd frontend
          npx eslint . || true

      - uses: hadolint/hadolint-action@v3.1.0


# ---------------- TEST ----------------
  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          cd api
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          cd api
          PYTHONPATH=. pytest --cov=. --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml


# ---------------- BUILD ----------------
  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: |
          docker build -t api:latest ./api
          docker build -t worker:latest ./worker
          docker build -t frontend:latest ./frontend


# ---------------- SECURITY SCAN ----------------
  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Build API image (needed again in this job)
        run: docker build -t api:latest ./api

      - name: Scan API image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "api:latest"
          format: "sarif"
          output: "trivy-api.sarif"
          severity: "CRITICAL"

      - name: Upload scan
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-api.sarif


# ---------------- INTEGRATION TEST ----------------
  integration:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - uses: actions/checkout@v4

      - name: Start app
        run: docker compose up -d --build

      - name: Wait for API
        run: |
          for i in {1..12}; do
            curl -f http://localhost:8000/health && break
            sleep 5
          done

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Test job flow
        run: |
          JOB_ID=$(curl -s -X POST http://localhost:8000/jobs | jq -r .job_id)

          for i in {1..12}; do
            STATUS=$(curl -s http://localhost:8000/jobs/$JOB_ID | jq -r .status)
            if [ "$STATUS" = "completed" ]; then
              echo "Job completed"
              exit 0
            fi
            sleep 3
          done

          echo "Job failed"
          exit 1

      - name: Tear down
        if: always()
        run: docker compose down


# ---------------- DEPLOY ----------------
  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy (rolling update simulation)
        run: |
          docker compose up -d --build

          for i in {1..12}; do
            if curl -f http://localhost:8000/health; then
              echo "Healthy"
              exit 0
            fi
            sleep 5
          done

          echo "Deploy failed"
          exit 1