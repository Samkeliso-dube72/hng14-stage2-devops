name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Python lint
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 api worker

      # JavaScript lint
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install eslint
        run: |
          cd frontend
          npm install eslint

      - name: Run eslint
        run: |
          cd frontend
          npx eslint .

      # Dockerfile lint
      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.1.0
