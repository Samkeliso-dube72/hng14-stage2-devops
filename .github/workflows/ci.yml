name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:

# ---------------- LINT ----------------
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Run Python lint checks
        run: flake8 api worker

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install
          npm install eslint

      - name: Run frontend lint checks
        run: |
          cd frontend
          npx eslint . || true

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0


# ---------------- TEST ----------------
  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd api
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run pytest suite
        run: |
          cd api
          PYTHONPATH=. pytest --cov=. --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml


# ---------------- BUILD ----------------
  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        run: |
          docker build \
            -t api:${{ github.sha }} \
            -t api:latest \
            ./api

      - name: Build Worker image
        run: |
          docker build \
            -t worker:${{ github.sha }} \
            -t worker:latest \
            ./worker

      - name: Build Frontend image
        run: |
          docker build \
            -t frontend:${{ github.sha }} \
            -t frontend:latest \
            ./frontend


# ---------------- SECURITY ----------------
  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Build API image for scan
        run: docker build -t api:latest ./api

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "api:latest"
          format: "sarif"
          output: "trivy.sarif"
          severity: "CRITICAL"

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif


# ---------------- INTEGRATION ----------------
  integration:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Start services
        run: docker compose up -d --build

      - name: Wait for API
        run: |
          for i in {1..12}; do
            curl -f http://localhost:8000/health && break
            sleep 5
          done

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run integration test
        run: |
          JOB_ID=$(curl -s -X POST http://localhost:8000/jobs | jq -r .job_id)

          for i in {1..12}; do
            STATUS=$(curl -s http://localhost:8000/jobs/$JOB_ID | jq -r .status)
            if [ "$STATUS" = "completed" ]; then
              echo "Job completed"
              exit 0
            fi
            sleep 3
          done

          echo "Job failed"
          exit 1

      - name: Tear down services
        if: always()
        run: docker compose down


# ---------------- DEPLOY ----------------
  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Deploy application
        run: |
          docker compose up -d --build

          for i in {1..12}; do
            if curl -f http://localhost:8000/health; then
              echo "Healthy"
              exit 0
            fi
            sleep 5
          done

          echo "Deploy failed"
          exit 1