name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:

# ---------------- LINT ----------------
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Run Python lint checks
        run: flake8 api worker

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install
          npm install eslint

      - name: Run frontend lint checks
        run: |
          cd frontend
          npx eslint . || true

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0


# ---------------- TEST ----------------
  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API dependencies
        run: |
          cd api
          pip install -r requirements.txt

      - name: Run pytest suite
        run: |
          cd api
          PYTHONPATH=. pytest --maxfail=1 --disable-warnings -q

# ---------------- BUILD ----------------
  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t api:latest ./api

      - name: Build Worker image
        run: docker build -t worker:latest ./worker

      - name: Build Frontend image
        run: docker build -t frontend:latest ./frontend


# ---------------- SECURITY ----------------
  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Build API image for scan
        run: docker build -t api:latest ./api

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "api:latest"
          format: "sarif"
          output: "trivy.sarif"
          severity: "CRITICAL"

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif


# ---------------- INTEGRATION ----------------
  integration:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Start services with Docker Compose
        run: docker compose up -d --build

      # ✅ FIX: wait LONGER + don't fail early
      - name: Wait for API to become healthy
        run: |
          for i in {1..20}; do
            if curl -f http://localhost:8000/health; then
              echo "API is ready"
              exit 0
            fi
            echo "Waiting for API..."
            sleep 5
          done
          echo "API failed to start"
          docker compose logs
          exit 1

      - name: Install jq tool
        run: sudo apt-get update && sudo apt-get install -y jq

      # ✅ REQUIRED integration test logic
      - name: Run job processing integration test
        timeout-minutes: 5
        run: |
          JOB_ID=$(curl -s -X POST http://localhost:8000/jobs | jq -r .job_id)

          for i in {1..20}; do
            STATUS=$(curl -s http://localhost:8000/jobs/$JOB_ID | jq -r .status)
            echo "Status: $STATUS"

            if [ "$STATUS" = "completed" ]; then
              echo "Job completed successfully"
              exit 0
            fi

            sleep 3
          done

          echo "Job did not complete in time"
          exit 1

      - name: Tear down services
        if: always()
        run: docker compose down


# ---------------- DEPLOY ----------------
  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Deploy application
        run: |
          docker compose up -d --build

          for i in {1..20}; do
            if curl -f http://localhost:8000/health; then
              echo "Deployment healthy"
              exit 0
            fi
            sleep 5
          done

          echo "Deployment failed"
          exit 1